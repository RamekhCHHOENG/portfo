services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ramekhchhoeng-portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    environment:
      - NUXT_APP_BASE_URL=/
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio.rule=Host(`portfolio.ramekhchhoeng.com`)
      - traefik.http.routers.portfolio.entrypoints=https
      - traefik.http.routers.portfolio.tls=true
      - traefik.http.services.portfolio.loadbalancer.server.port=80
      # HTTP → HTTPS redirect
      - traefik.http.routers.portfolio-http.rule=Host(`portfolio.ramekhchhoeng.com`)
      - traefik.http.routers.portfolio-http.entrypoints=http
      - traefik.http.routers.portfolio-http.middlewares=redirect-to-https@docker
    networks:
      - coolify

networks:
  coolify:
    external: true
