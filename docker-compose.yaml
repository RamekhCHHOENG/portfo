services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ramekhchhoeng-portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    environment:
      - NUXT_APP_BASE_URL=/
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

